version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shadow_house}
      POSTGRES_USER: ${POSTGRES_USER:-shadow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shadow_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shadow_user} -d ${POSTGRES_DB:-shadow_house}"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://shadow_user:shadow_password@db:5432/shadow_house}
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OTP_PROVIDER: ${OTP_PROVIDER:-dev}
      OTP_CODE_TTL_SECONDS: ${OTP_CODE_TTL_SECONDS:-300}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_DEV_MODE: ${OTP_DEV_MODE:-true}
      OTP_DEV_FIXED_CODE: ${OTP_DEV_FIXED_CODE:-}
      OTP_SECRET_KEY: ${OTP_SECRET_KEY:-shadow-house-dev-otp-secret}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
